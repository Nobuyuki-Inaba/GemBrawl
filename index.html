<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>GemBrawl - Phase 0</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { display: block; image-rendering: pixelated; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.88.2/dist/phaser.js"></script>
<script>
// ---- 定数 --------------------------------------------------------
const W = 800, H = 480;
const GRAVITY      = 1200;
const WALK         = 220;
const JUMP_VY      = -560;
const ATTACK_MS    = 250;   // 攻撃モーション時間
const ATTACK_RANGE = 48;    // 攻撃リーチ（横）
const ATTACK_H     = 30;    // 攻撃判定高さ
const TOTAL_GEMS   = 7;

const STAGE = {
  bgColor : 0x0a0a2e,
  wallColor: 0x2244aa,
  platColor: 0x336688,
  platTop  : 0x4488bb,
  wallW    : 24,
  platforms: [
    { y: 432, x1:  24, x2: 776 },
    { y: 352, x1:  24, x2: 280 },
    { y: 352, x1: 520, x2: 776 },
    { y: 272, x1: 160, x2: 640 },
    { y: 192, x1:  24, x2: 300 },
    { y: 192, x1: 500, x2: 776 },
    { y: 112, x1:  24, x2: 776 },
  ],
};

// 宝石の初期配置（各プラットフォームの上）
const GEM_POSITIONS = [
  { x: 400, y: 420 },  // 地面中央
  { x: 150, y: 340 },  // 左段1
  { x: 648, y: 340 },  // 右段1
  { x: 300, y: 260 },  // 中段2 左寄り
  { x: 500, y: 260 },  // 中段2 右寄り
  { x: 160, y: 180 },  // 左段3
  { x: 400, y: 100 },  // 最上段
];

// ---- 宝石描画 ----------------------------------------------------
function drawGem(g, x, y, color) {
  const s = 18;
  g.fillStyle(color, 1);
  // 菱形
  g.fillTriangle(x, y - s, x + s, y, x - s, y);
  g.fillTriangle(x, y + s * 0.7, x + s, y, x - s, y);
  // 光沢
  g.fillStyle(0xffffff, 0.5);
  g.fillTriangle(x - 3, y - s + 3, x + 6, y - 3, x - 7, y - 3);
}

// ---- キャラ描画 --------------------------------------------------
function drawChar(g, x, y, facingRight, onGround, attacking) {
  g.clear();
  const sx = facingRight ? 1 : -1;

  // 影
  g.fillStyle(0x000000, 0.25);
  g.fillEllipse(x, y + 24, 28, 8);

  // 足
  g.fillStyle(0x3333aa, 1);
  if (onGround) {
    g.fillRect(x - 10, y + 6,  9, 14);
    g.fillRect(x +  1, y + 6,  9, 14);
  } else {
    g.fillRect(x - 9,  y + 6,  7, 9);
    g.fillRect(x +  2, y + 6,  7, 9);
  }

  // 体
  g.fillStyle(0xdd4422, 1);
  g.fillRect(x - 11, y - 16, 22, 22);

  // 頭
  g.fillStyle(0xf0a878, 1);
  g.fillCircle(x, y - 26, 15);

  // 目
  g.fillStyle(0x111111, 1);
  g.fillCircle(x + sx * 6, y - 28, 3);
  g.fillStyle(0xffffff, 1);
  g.fillCircle(x + sx * 7, y - 29, 1);

  // 腕（攻撃中は大きく伸ばす）
  g.fillStyle(0xdd4422, 1);
  if (attacking) {
    // 拳を伸ばす
    g.fillRect(x + sx * 10, y - 15, sx * 26, 8);
    // 拳
    g.fillStyle(0xf0a878, 1);
    g.fillRect(x + sx * 34, y - 18, sx * 12, 14);
    // 攻撃エフェクト（黄色フラッシュ）
    g.fillStyle(0xffee00, 0.7);
    g.fillCircle(x + sx * 46, y - 11, 10);
    g.fillStyle(0xffffff, 0.5);
    g.fillCircle(x + sx * 46, y - 11, 5);
  } else {
    g.fillRect(x + sx * 10, y - 14, sx * 8, 6);
  }
}

// ---- Phaser シーン -----------------------------------------------
class GameScene extends Phaser.Scene {
  constructor() { super('Game'); }

  create() {
    const s = STAGE;

    // 背景
    this.add.rectangle(W / 2, H / 2, W, H, s.bgColor);

    // 左右の壁
    const wallG = this.add.graphics();
    wallG.fillStyle(s.wallColor, 1);
    wallG.fillRect(0, 0, s.wallW, H);
    wallG.fillRect(W - s.wallW, 0, s.wallW, H);
    wallG.fillStyle(0x3366cc, 1);
    for (let yy = 8; yy < H; yy += 24) {
      wallG.fillRect(4, yy, s.wallW - 8, 2);
      wallG.fillRect(W - s.wallW + 4, yy, s.wallW - 8, 2);
    }

    // プラットフォーム
    const platG = this.add.graphics();
    this.platBodies = [];
    s.platforms.forEach((p) => {
      const pw = p.x2 - p.x1, ph = 16;
      const cx = (p.x1 + p.x2) / 2, cy = p.y + ph / 2;
      platG.fillStyle(s.platColor, 1);
      platG.fillRect(p.x1, p.y, pw, ph);
      platG.fillStyle(s.platTop, 1);
      platG.fillRect(p.x1, p.y, pw, 4);
      const body = this.physics.add.staticImage(cx, cy, null);
      body.setVisible(false);
      body.setDisplaySize(pw, ph);
      body.refreshBody();
      this.platBodies.push({ body, topY: p.y });
    });

    // ---- 宝石 ----
    this.gemGraphics = this.add.graphics();
    this.gems = [];
    const gemColors = [0x44eeff, 0xff44aa, 0x44ff88, 0xffcc00, 0xff6644, 0xaa44ff, 0x44aaff];
    GEM_POSITIONS.forEach((pos, i) => {
      const gem = this.physics.add.staticImage(pos.x, pos.y, null);
      gem.setVisible(false);
      gem.setDisplaySize(36, 36);
      gem.refreshBody();
      gem.active = true;
      gem.color = gemColors[i];
      this.gems.push(gem);
    });

    // ---- プレイヤー ----
    this.charG = this.add.graphics();
    this.player = this.physics.add.image(W / 2, 380, null);
    this.player.setVisible(false);
    this.player.setDisplaySize(24, 46);
    this.player.setGravityY(GRAVITY);
    this.player.setMaxVelocity(1000, 900);
    this.physics.world.setBounds(s.wallW, 0, W - s.wallW * 2, H);
    this.player.setCollideWorldBounds(true);

    // 一方通行コライダー
    this.platBodies.forEach(({ body, topY }) => {
      this.physics.add.collider(this.player, body, null, (player, plat) => {
        if (this.dropping) return false;
        return player.body.velocity.y >= 0 && player.body.bottom - 4 <= topY + 4;
      }, this);
    });

    // 宝石オーバーラップ
    this.gems.forEach((gem) => {
      this.physics.add.overlap(this.player, gem, () => {
        if (!gem.active) return;
        gem.active = false;
        gem.destroy();
        this.gemCount++;
        this.updateHUD();
        // 全取得チェック
        if (this.gemCount >= TOTAL_GEMS) {
          this.showMessage('全部取った！');
        }
      });
    });

    // ---- 入力 ----
    this.cursors = this.input.keyboard.createCursorKeys();
    this.wasd = this.input.keyboard.addKeys({
      left  : Phaser.Input.Keyboard.KeyCodes.A,
      right : Phaser.Input.Keyboard.KeyCodes.D,
      jump  : Phaser.Input.Keyboard.KeyCodes.W,
      down  : Phaser.Input.Keyboard.KeyCodes.S,
      attack: Phaser.Input.Keyboard.KeyCodes.Z,
    });
    this.jumpWasDown   = false;
    this.downWasDown   = false;
    this.attackWasDown = false;
    this.dropping      = false;
    this.attackTimer   = 0;
    this.facingRight   = true;
    this.gemCount      = 0;

    // ---- HUD ----
    this.hudText = this.add.text(W - 30, 10, '', {
      font: '16px monospace', fill: '#ffffff',
    }).setOrigin(1, 0);
    this.updateHUD();

    this.msgText = this.add.text(W / 2, H / 2 - 20, '', {
      font: 'bold 32px monospace', fill: '#ffee00',
    }).setOrigin(0.5).setDepth(10);

    // 操作説明
    this.add.text(30, 10, 'A D:移動  W/↑:ジャンプ  S/↓:降り  Z:攻撃', {
      font: '13px monospace', fill: '#8899bb',
    });
  }

  updateHUD() {
    this.hudText.setText(`宝石: ${this.gemCount} / ${TOTAL_GEMS}`);
  }

  showMessage(msg) {
    this.msgText.setText(msg);
    this.time.delayedCall(2000, () => { this.msgText.setText(''); });
  }

  update(time, delta) {
    // 攻撃タイマー
    if (this.attackTimer > 0) this.attackTimer -= delta;
    const attacking = this.attackTimer > 0;

    // 水平移動（攻撃中は移動可能）
    const goLeft  = this.cursors.left.isDown  || this.wasd.left.isDown;
    const goRight = this.cursors.right.isDown || this.wasd.right.isDown;
    if      (goLeft  && !goRight) { this.player.setVelocityX(-WALK); this.facingRight = false; }
    else if (goRight && !goLeft)  { this.player.setVelocityX( WALK); this.facingRight = true;  }
    else                          { this.player.setVelocityX(0); }

    // ジャンプ
    const jumpDown = this.cursors.up.isDown || this.cursors.space.isDown || this.wasd.jump.isDown;
    const onGround = this.player.body.blocked.down;
    if (jumpDown && !this.jumpWasDown && onGround) this.player.setVelocityY(JUMP_VY);
    this.jumpWasDown = jumpDown;

    // 段降り
    const dropDown = this.cursors.down.isDown || this.wasd.down.isDown;
    if (dropDown && !this.downWasDown && onGround) {
      this.dropping = true;
      this.player.setVelocityY(100);
      this.time.delayedCall(220, () => { this.dropping = false; });
    }
    this.downWasDown = dropDown;

    // 攻撃
    const attackDown = this.wasd.attack.isDown;
    if (attackDown && !this.attackWasDown && !attacking) {
      this.attackTimer = ATTACK_MS;
    }
    this.attackWasDown = attackDown;

    // キャラ描画
    drawChar(this.charG, this.player.x, this.player.y, this.facingRight, onGround, attacking);

    // 宝石描画
    this.gemGraphics.clear();
    this.gems.forEach((gem) => {
      if (gem.active) drawGem(this.gemGraphics, gem.x, gem.y, gem.color);
    });
  }
}

new Phaser.Game({
  type: Phaser.AUTO,
  width: W,
  height: H,
  physics: {
    default: 'arcade',
    arcade: { gravity: { y: 0 }, debug: false },
  },
  scene: [GameScene],
});
</script>
</body>
</html>
